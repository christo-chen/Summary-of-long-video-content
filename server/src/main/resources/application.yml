server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_summary?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Cwz102518!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: YourSuperSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong2024
  expiration: 604800000  # 7 days in milliseconds

# Notion OAuth
notion:
  client-id: your-notion-client-id
  client-secret: your-notion-client-secret
  redirect-uri: http://localhost:8080/api/export/notion/callback
